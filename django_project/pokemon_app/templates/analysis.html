{% extends "base.html" %}

{% block title %}Team Analysis{% endblock %}

{% block extra_css %}
<style>
    .rating-very-resistant { color: #198754; font-weight: bold; }
    .rating-resistant { color: #20c997; }
    .rating-neutral { color: #6c757d; }
    .rating-vulnerable { color: #fd7e14; }
    .rating-very-vulnerable { color: #dc3545; font-weight: bold; }
    .type-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        color: #fff;
        font-size: 0.85rem;
        min-width: 70px;
        text-align: center;
    }
    .type-bug { background: #A8B820; }
    .type-dark { background: #705848; }
    .type-dragon { background: #7038F8; }
    .type-electric { background: #F8D030; color: #333; }
    .type-fairy { background: #EE99AC; color: #333; }
    .type-fight { background: #C03028; }
    .type-fire { background: #F08030; }
    .type-flying { background: #A890F0; }
    .type-ghost { background: #705898; }
    .type-grass { background: #78C850; }
    .type-ground { background: #E0C068; color: #333; }
    .type-ice { background: #98D8D8; color: #333; }
    .type-normal { background: #A8A878; }
    .type-poison { background: #A040A0; }
    .type-psychic { background: #F85888; }
    .type-rock { background: #B8A038; }
    .type-steel { background: #B8B8D0; color: #333; }
    .type-water { background: #6890F0; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <h1 class="mb-0">Team Analysis</h1>
    <a href="/teams/" class="btn btn-outline-secondary ms-3">Back to Teams</a>
</div>

<div id="alertContainer"></div>
<div id="analysisContainer">
    <p>Loading analysis...</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const teamId = {{ team_id }};

    const RATING_CLASS = {
        'very resistant': 'rating-very-resistant',
        'resistant': 'rating-resistant',
        'neutral': 'rating-neutral',
        'vulnerable': 'rating-vulnerable',
        'very vulnerable': 'rating-very-vulnerable',
    };

    document.addEventListener('DOMContentLoaded', function () {
        const container = document.getElementById('analysisContainer');

        fetch(`/api/team/${teamId}/analysis/`)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    container.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                    return;
                }
                container.innerHTML = renderAnalysis(data);
            })
            .catch(() => {
                container.innerHTML = '<div class="alert alert-danger">Failed to load analysis.</div>';
            });
    });

    function typeBadge(name) {
        return `<span class="type-badge type-${name}">${name}</span>`;
    }

    function renderAnalysis(data) {
        let html = '';

        // Team members
        html += `<div class="card mb-4">
            <div class="card-header"><strong>${data.team}</strong></div>
            <div class="card-body">
                <div class="row">`;
        data.members.forEach((name, i) => {
            html += `<div class="col-md-2 text-center">
                <span class="badge bg-secondary">Slot ${i + 1}</span>
                <p class="mt-1 mb-0">${name}</p>
            </div>`;
        });
        html += `</div></div></div>`;

        // Summary: strengths and weaknesses
        html += `<div class="row mb-4">
            <div class="col-md-6">
                <div class="card border-success">
                    <div class="card-header bg-success text-white">Strengths (resistant types)</div>
                    <div class="card-body">`;
        if (data.strengths.length === 0) {
            html += '<p class="mb-0 text-muted">No type resistances.</p>';
        } else {
            data.strengths.forEach(t => {
                const info = data.type_analysis[t];
                html += `<div class="d-flex align-items-center mb-1">
                    ${typeBadge(t)}
                    <span class="ms-2">avg ${info.average_multiplier}x</span>
                </div>`;
            });
        }
        html += `</div></div></div>
            <div class="col-md-6">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">Weaknesses (vulnerable types)</div>
                    <div class="card-body">`;
        if (data.weaknesses.length === 0) {
            html += '<p class="mb-0 text-muted">No type weaknesses.</p>';
        } else {
            data.weaknesses.forEach(t => {
                const info = data.type_analysis[t];
                html += `<div class="d-flex align-items-center mb-1">
                    ${typeBadge(t)}
                    <span class="ms-2">avg ${info.average_multiplier}x</span>
                </div>`;
            });
        }
        html += `</div></div></div></div>`;

        // Full breakdown table
        html += `<div class="card">
            <div class="card-header"><strong>Full Type Breakdown</strong></div>
            <div class="card-body table-responsive">
                <table class="table table-sm table-bordered align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Type</th>`;
        data.members.forEach(name => {
            html += `<th class="text-center">${name}</th>`;
        });
        html += `<th class="text-center">Avg</th>
                            <th class="text-center">Best</th>
                            <th class="text-center">Worst</th>
                            <th class="text-center">Rating</th>
                        </tr>
                    </thead><tbody>`;

        const types = Object.keys(data.type_analysis).sort();
        types.forEach(t => {
            const info = data.type_analysis[t];
            html += `<tr><td>${typeBadge(t)}</td>`;
            info.pokemon_multipliers.forEach(entry => {
                let cls = '';
                if (entry.multiplier < 1) cls = 'text-success';
                else if (entry.multiplier > 1) cls = 'text-danger';
                html += `<td class="text-center ${cls}">${entry.multiplier}x</td>`;
            });
            const ratingCls = RATING_CLASS[info.rating] || '';
            html += `<td class="text-center"><strong>${info.average_multiplier}x</strong></td>
                     <td class="text-center text-success">${info.best_pokemon.name} (${info.best_pokemon.multiplier}x)</td>
                     <td class="text-center text-danger">${info.worst_pokemon.name} (${info.worst_pokemon.multiplier}x)</td>
                     <td class="text-center ${ratingCls}">${info.rating}</td></tr>`;
        });

        html += `</tbody></table></div></div>`;

        return html;
    }
</script>
{% endblock %}
