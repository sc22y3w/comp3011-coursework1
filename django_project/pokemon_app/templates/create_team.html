{% extends "base.html" %}

{% block title %}Create Team{% endblock %}

{% block content %}
<h1 class="mb-4">Create a Pokémon Team</h1>

<div id="alertContainer"></div>

<form id="createTeamForm">
    {% csrf_token %}
    <div class="mb-3">
        <label for="teamName" class="form-label">Team Name</label>
        <input type="text" class="form-control" id="teamName" required>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="teamPublic">
        <label class="form-check-label" for="teamPublic">
            Show team to public
        </label>
    </div>

    <div class="row">
        {% for i in slots %}
        <div class="col-md-4 mb-3">
            <label for="pokemon_{{ i }}" class="form-label">Pokémon {{ i }}</label>
            <select class="form-select pokemon-select" id="pokemon_{{ i }}" required>
                <option value="">Loading...</option>
            </select>
        </div>
        {% endfor %}
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn">Create Team</button>
</form>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const selects = document.querySelectorAll('.pokemon-select');

        fetch('/api/pokemon/')
            .then(response => response.json())
            .then(data => {
                const pokemon = data.pokemon;
                selects.forEach(select => {
                    select.innerHTML = '<option value="">-- Select --</option>';
                    pokemon.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.id;
                        opt.textContent = `${p.name} (${p.types.join(', ')})`;
                        select.appendChild(opt);
                    });
                });
            })
            .catch(() => {
                selects.forEach(s => {
                    s.innerHTML = '<option value="">Failed to load</option>';
                });
            });

        document.getElementById('createTeamForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = '';

            const body = {
                name: document.getElementById('teamName').value,
                public: document.getElementById('teamPublic').checked
            };
            for (let i = 1; i <= 6; i++) {
                body[`pokemon_${i}`] = parseInt(document.getElementById(`pokemon_${i}`).value);
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            fetch('/api/team/create/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(body)
            })
            .then(response => {
                if (response.status === 201) {
                    alertContainer.innerHTML =
                        '<div class="alert alert-success">Team created successfully!</div>';
                    document.getElementById('createTeamForm').reset();
                } else {
                    return response.json().then(data => {
                        alertContainer.innerHTML =
                            `<div class="alert alert-danger">${data.error || 'Something went wrong.'}</div>`;
                    });
                }
            })
            .catch(() => {
                alertContainer.innerHTML =
                    '<div class="alert alert-danger">Network error. Please try again.</div>';
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Create Team';
            });
        });

        function getCookie(name) {
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                c = c.trim();
                if (c.startsWith(name + '=')) {
                    return decodeURIComponent(c.substring(name.length + 1));
                }
            }
            return '';
        }
    });
</script>
{% endblock %}
