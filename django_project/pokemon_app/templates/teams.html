{% extends "base.html" %}

{% block title %}Teams{% endblock %}

{% block content %}
<h1 class="mb-4">My Pokémon Teams</h1>

<div id="alertContainer"></div>
<div id="teamsContainer">
    <p>Loading teams...</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const container = document.getElementById('teamsContainer');

        function renderTypeBadges(types) {
            if (!types || types.length === 0) {
                return '';
            }
            return types.map(type =>
                `<span class="type-badge type-${type.toLowerCase()}">${type}</span>`
            ).join(' ');
        }

        Promise.all([
            fetch('/api/teams/').then(response => response.json()),
            fetch('/api/pokemon/').then(response => response.json()),
        ])
            .then(([teamsData, pokemonData]) => {
                const teams = teamsData.teams || [];
                const pokemonTypeMap = {};
                (pokemonData.pokemon || []).forEach(pokemon => {
                    pokemonTypeMap[pokemon.id] = pokemon.types || [];
                });

                if (teams.length === 0) {
                    container.innerHTML = '<p>No teams created yet. <a href="/team/create/">Create one!</a></p>';
                    return;
                }

                let html = '';
                teams.forEach(team => {
                    const visibilityBadge = team.public
                        ? '<span class="badge bg-success ms-2">Public</span>'
                        : '<span class="badge bg-secondary ms-2">Private</span>';
                    html += `<div class="card mb-3">
                        <div class="card-header"><strong>${team.name}</strong>${visibilityBadge}</div>
                        <div class="card-body">
                            <div class="row">`;
                    team.pokemon.forEach((p, idx) => {
                        const typesBadges = renderTypeBadges(pokemonTypeMap[p.id]);
                        html += `<div class="col-md-2 text-center">
                            <span class="badge bg-secondary">Slot ${idx + 1}</span>
                            <p class="mt-1 mb-0">${p.name}</p>
                            <div class="mt-1">${typesBadges}</div>
                        </div>`;
                    });
                    html += `</div></div>
                        <div class="card-footer">
                            <a href="/team/${team.id}/edit/" class="btn btn-sm btn-outline-primary">Edit Team</a>
                            <a href="/team/${team.id}/analysis/" class="btn btn-sm btn-outline-info ms-2">Analyse Team</a>
                            <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteTeam(${team.id}, '${team.name.replace(/'/g, "\\'")}')">Delete Team</button>
                        </div></div>`;
                });
                container.innerHTML = html;
            })
            .catch(() => {
                container.innerHTML = '<div class="alert alert-danger">Failed to load teams.</div>';
            });
    });

    function deleteTeam(teamId, teamName) {
        if (!confirm(`Are you sure you want to delete the team "${teamName}"?`)) return;

        const alertContainer = document.getElementById('alertContainer');
        alertContainer.innerHTML = '';

        fetch(`/api/team/${teamId}/delete/`, {
            method: 'DELETE',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        })
        .then(response => {
            if (response.ok) {
                location.reload();
            } else {
                return response.json().then(data => {
                    alertContainer.innerHTML =
                        `<div class="alert alert-danger">${data.error || 'Failed to delete team.'}</div>`;
                });
            }
        })
        .catch(() => {
            alertContainer.innerHTML =
                '<div class="alert alert-danger">Network error. Please try again.</div>';
        });
    }

    function getCookie(name) {
        const cookies = document.cookie.split(';');
        for (let c of cookies) {
            c = c.trim();
            if (c.startsWith(name + '=')) {
                return decodeURIComponent(c.substring(name.length + 1));
            }
        }
        return '';
    }
</script>
{% endblock %}
